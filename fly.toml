app = "oru-kural-backend"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "8080"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "5s"
    interval = "10s"
    method = "get"
    path = "/health"
    port = 8080
    protocol = "http"
    timeout = "2s"
    type = "http"
