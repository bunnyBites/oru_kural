name: Weekly Scraper

on:
  schedule:
    - cron: '0 2 * * 1'   # Monday 2am UTC = Monday 7:30am IST
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape-and-categorize:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # X API costs ~$100/month — only runs when X_BEARER_TOKEN secret is set.
      # Remove the secret from GitHub → Settings → Secrets to disable permanently.
      - name: Scrape X (@CMOTamilnadu) — skipped if no token
        if: ${{ env.X_BEARER_TOKEN != '' }}
        timeout-minutes: 10
        continue-on-error: true
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_MAX_PAGES: "2"
          X_MAX_RESULTS: "25"
        run: python scripts/scrape_tweets.py

      - name: Run Reddit signal scraper
        timeout-minutes: 10
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python scripts/scrape_reddit.py

      - name: Scrape CM events (TN Gov RSS + The Hindu TN + Chennai District + TN NIC)
        timeout-minutes: 10
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape_cm_events.py

      - name: Scrape CM Helpline + GCC grievance stats
        timeout-minutes: 10
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape_grievances.py

      - name: Categorize all new signals (X + Reddit)
        timeout-minutes: 10
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/categorize_signals.py

      - name: Cluster signals into Issues (Gemini)
        timeout-minutes: 10
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/cluster_issues.py

      - name: Link CM events to Issues (Gemini)
        timeout-minutes: 10
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/link_events_to_issues.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Oru Kural scrape job failed. Check logs above."
          echo "Run ID: ${{ github.run_id }}"
          echo "Triggered by: ${{ github.event_name }}"
